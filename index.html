<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#1D1B18" />
    <title>(주)동양 내부회계 PORTAL</title>
    <style>
      #splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#FAFAF8;transition:opacity .4s ease}
      #splash.hide{opacity:0;pointer-events:none}
      #splash .bar{width:120px;height:3px;background:#ECEAE4;border-radius:2px;overflow:hidden}
      #splash .bar>div{width:30%;height:100%;background:#5C564A;border-radius:2px;animation:slide 1s ease-in-out infinite}
      #splash p{font:500 13px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#9E9888;letter-spacing:.02em}
      @keyframes slide{0%{transform:translateX(-100%)}50%{transform:translateX(250%)}100%{transform:translateX(-100%)}}
    </style>
  </head>
  <body>
    <div id="splash"><p>(주)동양 내부회계 PORTAL</p><div class="bar"><div></div></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>window.addEventListener('load',function(){var s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(function(){s.remove()},500)}})</script>
  </body>
</html>
